server {
    server_name enviox.es www.enviox.es;

    # ── Shopify App routes (Remix on port 3000) ──
    location /app {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        add_header Content-Security-Policy "frame-ancestors https://*.myshopify.com https://admin.shopify.com";
    }

    location /auth {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Content-Security-Policy "frame-ancestors https://*.myshopify.com https://admin.shopify.com";
    }

    # Remix internal routes (App Bridge manifest patches, React Router)
    location /__manifest {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Content-Security-Policy "frame-ancestors https://*.myshopify.com https://admin.shopify.com";
    }

    location /webhooks {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Remix build assets (JS/CSS chunks from Vite)
    location /assets/ {
        root /var/www/html;
        try_files $uri @remix_assets;
    }

    location @remix_assets {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Landing Page (static HTML/CSS/JS) ──
    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Static file caching
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        root /var/www/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri @remix_assets;
    }

    add_header X-Content-Type-Options "nosniff";

    gzip on;
    gzip_types text/css application/javascript text/html application/json image/svg+xml;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/enviox.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/enviox.es/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.enviox.es) {
        return 301 https://$host$request_uri;
    }
    if ($host = enviox.es) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name enviox.es www.enviox.es;
    return 404;
}
