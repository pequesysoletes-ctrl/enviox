server {
    listen 443 ssl;
    server_name dhl.enviox.es;

    ssl_certificate /etc/letsencrypt/live/dhl.enviox.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dhl.enviox.es/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /assets/ {
        alias /var/www/dhl-pro/build/client/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    add_header X-Content-Type-Options "nosniff";
    add_header Content-Security-Policy "frame-ancestors https://*.myshopify.com https://admin.shopify.com";
}

server {
    listen 80;
    server_name dhl.enviox.es;
    return 301 https://$host$request_uri;
}
