<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Correos Pro - Cargando...</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ec5b13",
              "background-light": "#f8f6f6",
              "background-dark": "#221610",
            },
            fontFamily: {
              "display": ["Public Sans", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-skeleton {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            background-color: #E2E8F0; /* Slate-200 */
        }
        .dark .animate-skeleton {
            background-color: #3d2c25;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Navigation Bar Skeleton -->
<header class="flex items-center justify-between border-b border-slate-200 dark:border-primary/20 bg-white dark:bg-background-dark px-6 md:px-10 py-4">
<div class="flex items-center gap-4">
<div class="size-8 rounded-lg animate-skeleton"></div>
<div class="h-6 w-32 rounded animate-skeleton"></div>
</div>
<div class="flex gap-3">
<div class="size-10 rounded-xl animate-skeleton"></div>
<div class="size-10 rounded-xl animate-skeleton"></div>
</div>
</header>
<main class="flex-1 flex flex-col items-center py-8 px-4 md:px-10">
<div class="w-full max-w-6xl space-y-6">
<!-- Page Title Skeleton -->
<div class="flex flex-col gap-2">
<div class="h-10 w-64 md:w-80 rounded-lg animate-skeleton"></div>
</div>
<!-- Main Content Card -->
<div class="bg-white dark:bg-slate-900/50 rounded-xl shadow-sm border border-slate-200 dark:border-primary/10 overflow-hidden">
<!-- Filter Bar Skeleton -->
<div class="p-6 border-b border-slate-100 dark:border-primary/10 flex flex-wrap gap-4">
<div class="h-10 w-full md:w-64 rounded-lg animate-skeleton"></div> <!-- Search -->
<div class="h-10 w-32 rounded-lg animate-skeleton"></div> <!-- Carrier -->
<div class="h-10 w-32 rounded-lg animate-skeleton"></div> <!-- Status -->
<div class="h-10 w-40 rounded-lg animate-skeleton"></div> <!-- Date -->
</div>
<!-- Data Table Skeleton -->
<div class="overflow-x-auto">
<table class="w-full text-left border-collapse">
<thead>
<tr class="bg-slate-50 dark:bg-primary/5">
<th class="px-6 py-4"><div class="h-4 w-20 rounded animate-skeleton"></div></th>
<th class="px-6 py-4"><div class="h-4 w-32 rounded animate-skeleton"></div></th>
<th class="px-6 py-4"><div class="h-4 w-40 rounded animate-skeleton"></div></th>
<th class="px-6 py-4"><div class="h-4 w-24 rounded animate-skeleton"></div></th>
<th class="px-6 py-4 text-right"><div class="h-4 w-20 rounded ml-auto animate-skeleton"></div></th>
</tr>
</thead>
<tbody>
<!-- Row 1 -->
<tr class="border-t border-slate-100 dark:border-primary/5">
<td class="px-6 py-6"><div class="h-5 w-24 rounded animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-5 w-48 rounded animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-5 w-56 rounded animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-8 w-28 rounded-full animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-8 w-20 rounded-lg ml-auto animate-skeleton"></div></td>
</tr>
<!-- Row 2 -->
<tr class="border-t border-slate-100 dark:border-primary/5">
<td class="px-6 py-6"><div class="h-5 w-20 rounded animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-5 w-40 rounded animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-5 w-64 rounded animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-8 w-28 rounded-full animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-8 w-20 rounded-lg ml-auto animate-skeleton"></div></td>
</tr>
<!-- Row 3 -->
<tr class="border-t border-slate-100 dark:border-primary/5">
<td class="px-6 py-6"><div class="h-5 w-28 rounded animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-5 w-36 rounded animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-5 w-44 rounded animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-8 w-28 rounded-full animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-8 w-20 rounded-lg ml-auto animate-skeleton"></div></td>
</tr>
<!-- Row 4 -->
<tr class="border-t border-slate-100 dark:border-primary/5">
<td class="px-6 py-6"><div class="h-5 w-24 rounded animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-5 w-52 rounded animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-5 w-60 rounded animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-8 w-28 rounded-full animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-8 w-20 rounded-lg ml-auto animate-skeleton"></div></td>
</tr>
<!-- Row 5 -->
<tr class="border-t border-slate-100 dark:border-primary/5">
<td class="px-6 py-6"><div class="h-5 w-20 rounded animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-5 w-44 rounded animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-5 w-48 rounded animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-8 w-28 rounded-full animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-8 w-20 rounded-lg ml-auto animate-skeleton"></div></td>
</tr>
<!-- Row 6 -->
<tr class="border-t border-slate-100 dark:border-primary/5">
<td class="px-6 py-6"><div class="h-5 w-32 rounded animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-5 w-40 rounded animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-5 w-52 rounded animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-8 w-28 rounded-full animate-skeleton"></div></td>
<td class="px-6 py-6"><div class="h-8 w-20 rounded-lg ml-auto animate-skeleton"></div></td>
</tr>
</tbody>
</table>
</div>
<!-- Pagination Skeleton -->
<div class="p-6 border-t border-slate-100 dark:border-primary/10 flex items-center justify-end gap-2">
<div class="size-8 rounded animate-skeleton"></div> <!-- Prev -->
<div class="size-8 rounded bg-primary animate-skeleton opacity-20"></div> <!-- Active Page Accent -->
<div class="size-8 rounded animate-skeleton"></div>
<div class="size-8 rounded animate-skeleton"></div>
<div class="size-8 rounded animate-skeleton"></div> <!-- Next -->
</div>
</div>
<!-- Footer Summary Skeleton -->
<div class="flex justify-between items-center px-2">
<div class="h-5 w-48 rounded animate-skeleton"></div>
<div class="h-5 w-32 rounded animate-skeleton"></div>
</div>
</div>
</main>
</div>
</body></html>
