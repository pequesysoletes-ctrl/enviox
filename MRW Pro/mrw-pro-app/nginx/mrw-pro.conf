server {
    server_name enviox.es www.enviox.es;

    # Shopify App (Remix) — handles all app routes
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Landing page (static) at /landing/
    location /landing/ {
        alias /var/www/html/;
        index index.html;
        try_files $uri $uri/ /landing/index.html;
    }

    # Landing static assets (CSS, JS, images)
    location /landing/assets/ {
        alias /var/www/html/assets/;
        expires 30d;
        add_header Cache-Control "public";
    }

    add_header X-Content-Type-Options "nosniff";
    add_header Content-Security-Policy "frame-ancestors https://*.myshopify.com https://admin.shopify.com";

    gzip on;
    gzip_types text/css application/javascript text/html application/json;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/enviox.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/enviox.es/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.enviox.es) {
        return 301 https://$host$request_uri;
    }
    if ($host = enviox.es) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name enviox.es www.enviox.es;
    return 404;
}
