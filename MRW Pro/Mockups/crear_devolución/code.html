<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MRW Pro - Crear Devolución</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0369a1",
                        "background-light": "#f6f6f7",
                        "background-dark": "#0f1c23",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen text-slate-900 font-display">
<div class="relative flex min-h-screen w-full flex-col">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 w-full border-b border-slate-200 bg-white dark:bg-slate-900 px-4 md:px-10 py-4">
<div class="max-w-4xl mx-auto flex items-center justify-between">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center rounded-lg h-10 w-10 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-600">arrow_back</span>
</button>
<div class="flex items-center gap-3">
<div class="bg-primary text-white p-1 rounded">
<svg class="size-6" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path d="M6 6H42L36 24L42 42H6L12 24L6 6Z" fill="currentColor"></path></svg>
</div>
<h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Crear devolución</h1>
</div>
</div>
<div class="flex gap-2">
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-600">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-600">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</div>
</header>
<main class="flex-1 w-full max-w-4xl mx-auto py-8 px-4">
<div class="space-y-6">
<!-- Card 1: Seleccionar Pedido -->
<section class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
<div class="p-6 border-b border-slate-100 dark:border-slate-800">
<h2 class="text-lg font-semibold text-slate-900 dark:text-white">1. Seleccionar pedido</h2>
<p class="text-sm text-slate-500">Busque el pedido que desea gestionar</p>
</div>
<div class="p-6 space-y-4">
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
<input class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-primary transition-all text-sm" placeholder="Buscar pedido entregado..." type="text" value="#1234"/>
</div>
<!-- Selected State Item -->
<div class="flex items-center justify-between p-4 rounded-xl bg-primary/5 border border-primary/20">
<div class="flex items-center gap-4">
<div class="bg-primary/10 p-2 rounded-full text-primary">
<span class="material-symbols-outlined">check_circle</span>
</div>
<div>
<p class="text-sm font-semibold text-slate-900 dark:text-white">#1234 — María García</p>
<p class="text-xs text-slate-500">Entregado 14/02/2026</p>
</div>
</div>
<button class="text-xs font-medium text-primary hover:underline">Cambiar</button>
</div>
</div>
</section>
<!-- Card 2: Motivo de la devolución -->
<section class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
<div class="p-6 border-b border-slate-100 dark:border-slate-800">
<h2 class="text-lg font-semibold text-slate-900 dark:text-white">2. Motivo de la devolución</h2>
</div>
<div class="p-6 space-y-4">
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Razón del retorno</label>
<select class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-primary transition-all text-sm">
<option selected="">Producto defectuoso</option>
<option>Talla incorrecta</option>
<option>No corresponde con la descripción</option>
<option>Cambio de opinión</option>
<option>Otro</option>
</select>
</div>
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Notas adicionales (opcional)</label>
<textarea class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-primary transition-all text-sm" placeholder="Escriba aquí cualquier detalle relevante..." rows="3"></textarea>
</div>
</div>
</section>
<!-- Card 3: Dirección de recogida -->
<section class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
<div class="p-6 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
<h2 class="text-lg font-semibold text-slate-900 dark:text-white">3. Dirección de recogida</h2>
<div class="flex items-center gap-2">
<span class="text-xs font-medium text-slate-500">Usar dirección original</span>
<button class="relative inline-flex h-6 w-11 shrink-0 cursor-pointer rounded-full border-2 border-transparent bg-primary transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
<span class="translate-x-5 pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out"></span>
</button>
</div>
</div>
<div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-50/50 dark:bg-slate-800/20">
<div class="col-span-full">
<label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Nombre completo</label>
<input class="w-full rounded-lg border-slate-200 bg-slate-100 dark:bg-slate-800/50 text-slate-600 text-sm cursor-not-allowed" disabled="" type="text" value="María García"/>
</div>
<div class="col-span-full">
<label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Dirección</label>
<input class="w-full rounded-lg border-slate-200 bg-slate-100 dark:bg-slate-800/50 text-slate-600 text-sm cursor-not-allowed" disabled="" type="text" value="Calle Mayor 45, 2ºB"/>
</div>
<div>
<label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Ciudad</label>
<input class="w-full rounded-lg border-slate-200 bg-slate-100 dark:bg-slate-800/50 text-slate-600 text-sm cursor-not-allowed" disabled="" type="text" value="Madrid"/>
</div>
<div>
<label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Código Postal</label>
<input class="w-full rounded-lg border-slate-200 bg-slate-100 dark:bg-slate-800/50 text-slate-600 text-sm cursor-not-allowed" disabled="" type="text" value="28013"/>
</div>
<div>
<label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Provincia</label>
<input class="w-full rounded-lg border-slate-200 bg-slate-100 dark:bg-slate-800/50 text-slate-600 text-sm cursor-not-allowed" disabled="" type="text" value="Madrid"/>
</div>
<div>
<label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Teléfono</label>
<input class="w-full rounded-lg border-slate-200 bg-slate-100 dark:bg-slate-800/50 text-slate-600 text-sm cursor-not-allowed" disabled="" type="text" value="+34 600 000 000"/>
</div>
</div>
</section>
<!-- Card 4: Método de devolución -->
<section class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
<div class="p-6 border-b border-slate-100 dark:border-slate-800">
<h2 class="text-lg font-semibold text-slate-900 dark:text-white">4. Método de devolución</h2>
</div>
<div class="p-6 space-y-3">
<label class="relative flex cursor-pointer rounded-xl border-2 border-primary bg-primary/5 p-4 focus:outline-none">
<input checked="" class="mt-0.5 h-4 w-4 shrink-0 cursor-pointer text-primary border-slate-300 focus:ring-primary" name="delivery-method" type="radio" value="drop-off"/>
<span class="ml-3 flex flex-col">
<span class="block text-sm font-semibold text-slate-900 dark:text-white">Generar etiqueta (el cliente lleva a punto MRW)</span>
<span class="block text-xs text-slate-500">Más rápido y flexible para el cliente</span>
</span>
</label>
<label class="relative flex cursor-pointer rounded-xl border border-slate-200 dark:border-slate-800 p-4 hover:border-slate-300 transition-colors focus:outline-none">
<input class="mt-0.5 h-4 w-4 shrink-0 cursor-pointer text-primary border-slate-300 focus:ring-primary" name="delivery-method" type="radio" value="pickup"/>
<span class="ml-3 flex flex-col">
<span class="block text-sm font-medium text-slate-900 dark:text-white">Solicitar recogida en domicilio</span>
<span class="block text-xs text-slate-500">Un mensajero pasará por la dirección indicada</span>
</span>
</label>
</div>
</section>
<!-- Action Footer -->
<div class="flex flex-col-reverse md:flex-row items-center justify-end gap-3 pb-12 pt-4">
<button class="w-full md:w-auto px-8 py-3 text-sm font-semibold text-slate-600 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-800 rounded-lg transition-colors">
                        Cancelar
                    </button>
<button class="w-full md:w-auto px-10 py-3 bg-primary text-white text-sm font-bold rounded-lg shadow-lg shadow-primary/25 hover:bg-primary/90 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg">local_shipping</span>
                        Generar etiqueta de devolución
                    </button>
</div>
</div>
</main>
</div>
</body></html>
