server {
    listen 443 ssl;
    server_name geomarkets.enviox.es;

    ssl_certificate /etc/letsencrypt/live/geomarkets.enviox.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/geomarkets.enviox.es/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Serve static assets directly from the build
    location /assets/ {
        alias /var/www/geomarkets-eu/build/client/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}

server {
    listen 80;
    server_name geomarkets.enviox.es;
    return 301 https://$host$request_uri;
}
